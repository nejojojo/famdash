name: daily-analyst
on:
  schedule:
    # 14:00 UTC = 22:00 MYT (UTC+8), i.e. 10pm daily. NOTE: GitHub cron is best-effort and can be delayed 5–30+ min.
    - cron: '0 14 * * *'
  workflow_dispatch:
    inputs:
      scenario:
        description: 'Scenario: auto (gated, default) | all_normal | stale_data | llm'
        default: 'auto'
      force:
        description: 'Force a scenario on a gated (auto) day? Set to 1 to force.'
        default: ''

permissions:
  contents: write

# Don't let a manual dispatch and the scheduled run race each other onto the same branch.
concurrency:
  group: daily-analyst
  cancel-in-progress: false

jobs:
  analyst:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm ci
      # Gate: a regression must never ship a daily report. All tests use fakes — no secrets needed.
      - name: Run tests
        run: node --test
      - name: Run analyst
        run: node analyst.js
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: ${{ secrets.GEMINI_MODEL }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          SCENARIO: ${{ github.event.inputs.scenario || 'auto' }}
          FORCE_SCENARIO: ${{ github.event.inputs.force || '' }}
      - name: Commit data.json
        if: success()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Rebase on the latest tip so a concurrent commit doesn't cause a non-fast-forward push.
          git pull --rebase --autostash origin "${{ github.ref_name }}" || true
          git add -A data.json history          # stages today's store, the new day file, the index, and any pruned files
          if git diff --cached --quiet; then
            echo "nothing to commit"
          else
            git commit -m "data: daily report $(date -u +%Y-%m-%d)"
            git push
          fi
